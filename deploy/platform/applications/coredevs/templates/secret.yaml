{{- if .Values.github.tokenEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coredevs.fullname" . }}-github
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Resolved by the ArgoCD Vault Plugin from the SOPS-encrypted secret.
  token: {{ .Values.github.token | quote }}
{{- end }}
