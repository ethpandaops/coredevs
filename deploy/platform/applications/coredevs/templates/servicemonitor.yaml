{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "coredevs.fullname" . }}
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "coredevs.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.scrapeInterval | default "30s" }}
{{- end }}
