apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coredevs.fullname" . }}-db
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The Postgres password. Resolved by the ArgoCD Vault Plugin from SOPS, like
  # the GitHub token. The DSN is composed from this in coredevs.dbEnv.
  password: {{ .Values.postgres.password | quote }}
