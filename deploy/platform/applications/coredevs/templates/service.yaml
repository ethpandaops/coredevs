apiVersion: v1
kind: Service
metadata:
  name: {{ include "coredevs.fullname" . }}
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "coredevs.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
