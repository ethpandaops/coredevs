apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coredevs.fullname" . }}-reader
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
    app.kubernetes.io/component: reader
  {{- if .Values.keel.enabled }}
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Readers are stateless: they load the published snapshot from Postgres and
  # serve it. RollingUpdate(maxUnavailable=0) plus the warm-gated readiness probe
  # means a new pod only takes traffic once it has loaded a snapshot, so deploys
  # are zero-downtime and never serve a cold pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "coredevs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reader
  template:
    metadata:
      labels:
        {{- include "coredevs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reader
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Spread readers across nodes so one node failing can't take serving down.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "coredevs.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: reader
      containers:
        - name: coredevs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - --config=/app/config.yaml
            - --role=reader
          env:
            {{- include "coredevs.dbEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Readiness withholds traffic until the first snapshot is loaded, so the
          # rolling update waits for a warm reader before retiring an old one.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
