apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coredevs.fullname" . }}-config
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
data:
  config.yaml: |
    http:
      addr: ":8080"
    syncInterval: {{ .Values.syncInterval | quote }}
    snapshotPath: /data/index.json
    sources:
      protocolGuild:
        enabled: true
        url: https://raw.githubusercontent.com/protocolguild/documentation/main/docs/01-membership.md
      githubOrg:
        enabled: true
        baseURL: https://api.github.com
        tokenEnv: GITHUB_TOKEN
    teams:
      {{- range $slug, $team := .Values.teams }}
      {{ $slug }}:
        displayName: {{ $team.displayName | quote }}
        layer: {{ $team.layer | quote }}
        protocolGuildSections: {{ toJson $team.protocolGuildSections }}
        githubOrgs: {{ toJson (default (list) $team.githubOrgs) }}
      {{- end }}
