{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "coredevs.fullname" . }}-reader
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
    app.kubernetes.io/component: reader
spec:
  # Keep a quorum of readers serving through node drains and upgrades.
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "coredevs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reader
{{- end }}
