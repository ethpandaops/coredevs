apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coredevs.fullname" . }}
  labels:
    {{- include "coredevs.labels" . | nindent 4 }}
  {{- if .Values.keel.enabled }}
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  # The snapshot PVC is ReadWriteOnce and there is a single replica, so the old
  # pod must release the volume before the new one mounts it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "coredevs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coredevs.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "coredevs.fullname" . }}-data
      containers:
        - name: coredevs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          # team registry + sources come from the image's baked /app/config.yaml
          # (the repo's config.yaml) — the single source of truth.
          args:
            - --config=/app/config.yaml
          {{- if .Values.github.tokenEnabled }}
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "coredevs.fullname" . }}-github
                  key: token
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
