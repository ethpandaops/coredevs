nameOverride: ""
fullnameOverride: coredevs

replicaCount: 1

image:
  repository: ghcr.io/ethpandaops/coredevs
  tag: latest
  pullPolicy: IfNotPresent

# Keel auto-pulls a freshly pushed :latest. Disabled in staging.
keel:
  enabled: true
  pollSchedule: "@every 5m"

# Public ingress for the read-only API.
# Convention: <app>.analytics.<env>.platform.ethpandaops.io
ingress:
  enabled: true
  className: ingress-nginx-public
  host: coredevs.analytics.staging.platform.ethpandaops.io
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

# Small PVC holding the last-good index snapshot (no database).
storage:
  size: 1Gi
  storageClass: local-path

# How often datasources are refreshed.
syncInterval: 3h

github:
  # The synced github-org source only calls GitHub for orgs explicitly wired
  # into a team (none by default), so a token is optional. It is used to lift
  # the rate limit on the on-demand /api/v1/orgs/{org}/members endpoint.
  # Enable to inject a token from SOPS via the AVP placeholder below.
  tokenEnabled: false
  token: <path:/secrets/clusters/primary/environment/primary.enc.yaml#coredevs | jsonPath {.github_token}>

protocolGuild:
  # Sanity floor: keep last-good if a parse yields fewer members than this.
  minMembers: 50

serviceMonitor:
  enabled: true
  scrapeInterval: 30s

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 192Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []

# The canonical team registry served by the API. This is the deploy-time source
# of truth (editable here without rebuilding the image). Mirrors the repo's
# config.yaml team mapping. See that file for the org-wiring caveats. `kind` is
# one of client | research | coordination | delivery.
teams:
  # Consensus clients
  grandine: { displayName: Grandine, kind: client, layer: cl, protocolGuildSections: [Grandine], githubOrgs: [] }
  lighthouse: { displayName: Lighthouse, kind: client, layer: cl, protocolGuildSections: [Lighthouse], githubOrgs: [] }
  lodestar: { displayName: Lodestar, kind: client, layer: cl, protocolGuildSections: [Lodestar], githubOrgs: [] }
  nimbus: { displayName: Nimbus, kind: client, layer: cl, protocolGuildSections: [Nimbus], githubOrgs: [] }
  prysm: { displayName: Prysm, kind: client, layer: cl, protocolGuildSections: [Prysm], githubOrgs: [] }
  teku: { displayName: Teku, kind: client, layer: cl, protocolGuildSections: [Teku], githubOrgs: [] }
  # Execution clients
  besu: { displayName: Besu, kind: client, layer: el, protocolGuildSections: [Hyperledger Besu, Besu], githubOrgs: [] }
  erigon: { displayName: Erigon, kind: client, layer: el, protocolGuildSections: [Erigon], githubOrgs: [] }
  geth: { displayName: Geth, kind: client, layer: el, protocolGuildSections: [Geth], githubOrgs: [] }
  nethermind: { displayName: Nethermind, kind: client, layer: el, protocolGuildSections: [Nethermind], githubOrgs: [] }
  reth: { displayName: Reth, kind: client, layer: el, protocolGuildSections: [Reth], githubOrgs: [] }
  # Research (Protocol Guild "Wayfinding")
  cryptography-research: { displayName: Cryptography Research, kind: research, protocolGuildSections: [Cryptography Research] }
  p2p-networking: { displayName: P2P Networking, kind: research, protocolGuildSections: [P2P Networking] }
  protocol-architecture: { displayName: Protocol Architecture, kind: research, protocolGuildSections: [Protocol Architecture] }
  protocol-consensus: { displayName: Protocol Consensus, kind: research, protocolGuildSections: [Protocol Consensus] }
  protocol-prototyping: { displayName: Protocol Prototyping, kind: research, protocolGuildSections: [Protocol Prototyping] }
  rig: { displayName: Robust Incentive Group (RIG), kind: research, protocolGuildSections: [Robust Incentive Group (RIG)] }
  stateless-consensus: { displayName: Stateless Consensus, kind: research, protocolGuildSections: [Stateless Consensus] }
  zkevm: { displayName: zkEVM, kind: research, protocolGuildSections: [zkEVM] }
  # Spec coordination (Protocol Guild "Governance")
  el-specs: { displayName: Execution Layer Specs + Coordination, kind: coordination, layer: el, protocolGuildSections: [Execution Layer Specs + Coordination] }
  cl-specs: { displayName: Consensus Layer Specs + Coordination, kind: coordination, layer: cl, protocolGuildSections: [Consensus Layer Specs + Coordination] }
  # Upgrade delivery (Protocol Guild "Upgrade Delivery")
  devnets: { displayName: Dev/Testnets, kind: delivery, protocolGuildSections: [Dev/Testnets] }
  testing: { displayName: Testing, kind: delivery, protocolGuildSections: [Testing] }
  ethereumjs: { displayName: EthereumJS, kind: delivery, protocolGuildSections: [EthereumJS] }
  security: { displayName: Security, kind: delivery, protocolGuildSections: [Security] }
  pg-operations: { displayName: Funding + PG Operations, kind: delivery, protocolGuildSections: [Funding + PG Operations] }
