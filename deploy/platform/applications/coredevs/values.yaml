nameOverride: ""
fullnameOverride: coredevs

replicaCount: 1

image:
  repository: ghcr.io/ethpandaops/coredevs
  tag: latest
  # Always so each rollout pulls the current :latest digest.
  pullPolicy: Always

# Keel polls ghcr and force-updates the pod when :latest changes — the auto-pull
# path (ArgoCD syncs git, not the registry). Short poll = low push→live latency.
keel:
  enabled: true
  pollSchedule: "@every 3m"

# Public ingress for the read-only API.
# Convention: <app>.analytics.<env>.platform.ethpandaops.io
ingress:
  enabled: true
  className: ingress-nginx-public
  host: coredevs.analytics.staging.platform.ethpandaops.io
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

# Small PVC holding the last-good index snapshot (no database).
storage:
  size: 1Gi
  storageClass: local-path

github:
  # The synced github-org source only calls GitHub for orgs explicitly wired
  # into a team (none by default), so a token is optional. It is used to lift
  # the rate limit on the on-demand /api/v1/orgs/{org}/members endpoint.
  # Enable to inject a token from SOPS via the AVP placeholder below.
  tokenEnabled: false
  token: <path:/secrets/clusters/primary/environment/primary.enc.yaml#coredevs | jsonPath {.github_token}>

serviceMonitor:
  enabled: true
  scrapeInterval: 30s

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 192Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
