<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>coredevs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--ink:#000;--mut:#666;--faint:#999;--line:#eaeaea;--line2:#000;--acc:#0070f3;--code:#fafafa;
--sans:"Geist",system-ui,-apple-system,sans-serif;--mono:"Geist Mono",ui-monospace,Menlo,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:940px;margin:0 auto;padding:0 24px 110px}
header{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-bottom:1px solid var(--line2);position:sticky;top:0;background:var(--bg);z-index:5}
.brand{font-weight:600;font-size:16px;letter-spacing:-.02em}
.brand a{display:flex;align-items:baseline;gap:10px}
.brand .m{font-family:var(--mono);color:var(--mut);font-weight:400;font-size:12px;letter-spacing:0}
.live{font-family:var(--mono);font-size:12px;color:var(--mut)}.live b{color:var(--acc)}

h2{font-size:12px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--faint);
   font-weight:500;margin:40px 0 16px}

/* api example list */
.api{border:1px solid var(--line)}
.api .ex{display:grid;grid-template-columns:minmax(190px,260px) 1fr;gap:0;border-bottom:1px solid var(--line)}
.api .ex:last-child{border-bottom:0}
.api .d{padding:13px 16px;color:var(--mut);border-right:1px solid var(--line);font-size:13px}
.api .c{position:relative;background:var(--code);font-family:var(--mono);font-size:12.5px;
        padding:12px 48px 12px 16px;white-space:normal;overflow-wrap:anywhere;word-break:break-word}
.api .c>span{display:block}
.api .c .tok{color:var(--acc)}.api .c .mut{color:var(--faint)}
.cp{position:absolute;right:8px;top:9px;font-family:var(--mono);font-size:10px;
    letter-spacing:.05em;text-transform:uppercase;background:#fff;border:1px solid var(--line);border-radius:4px;
    color:var(--mut);padding:3px 7px;cursor:pointer;opacity:0;transition:opacity .12s}
.api .c:hover .cp{opacity:1}.cp:hover{border-color:var(--ink);color:var(--ink)}
@media(max-width:620px){.api .ex{grid-template-columns:1fr}.api .d{border-right:0;border-bottom:1px solid var(--line)}}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-bottom:0}
.st{padding:16px 18px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.st:nth-child(4n){border-right:0}
.st .k{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
.st .v{font-size:24px;font-weight:500;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
@media(max-width:620px){.stats{grid-template-columns:repeat(2,1fr)}.st:nth-child(2n){border-right:0}}

/* kind + rows */
.kind{margin-top:34px}
.kh{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--line2)}
.kh h3{margin:0;font-size:13px;font-weight:600;letter-spacing:-.01em}
.kh .c{font-family:var(--mono);font-size:12px;color:var(--faint)}
.row{display:grid;grid-template-columns:1fr auto auto;gap:18px;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.row:hover{background:#fafafa}.row:hover .nm{text-decoration:underline;text-underline-offset:2px}
.nm{font-weight:500;letter-spacing:-.01em}.sg{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:10px}
.br{font-family:var(--mono);font-size:12px;color:var(--mut);text-align:right;font-variant-numeric:tabular-nums;min-width:150px}
.br .z{color:#ccc}.tt{font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums;min-width:34px;text-align:right}
.arw{font-family:var(--mono);color:var(--faint);width:1em}
@media(max-width:620px){.br{display:none}}

/* team page */
.crumb{font-family:var(--mono);font-size:12px;color:var(--mut);margin:26px 0 0}
.crumb a:hover{color:var(--ink)}.crumb .sep{color:var(--faint);margin:0 6px}
.thead{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin:10px 0 4px;
       padding-bottom:18px;border-bottom:1px solid var(--line2)}
.thead h1{margin:0;font-size:34px;font-weight:600;letter-spacing:-.03em}
.thead .meta{font-family:var(--mono);font-size:12px;color:var(--mut);margin-top:8px}
.kpill{display:inline-block;font-family:var(--mono);font-size:11px;border:1px solid var(--line);border-radius:4px;padding:2px 7px;color:var(--mut)}
.thead .big{font-family:var(--mono);font-size:40px;font-weight:500;letter-spacing:-.03em;line-height:1;text-align:right}
.thead .big small{display:block;font-size:11px;color:var(--faint);letter-spacing:.04em;margin-top:6px;font-weight:400}
.members{column-count:3;column-gap:34px;margin-top:6px}
@media(max-width:760px){.members{column-count:2}}@media(max-width:460px){.members{column-count:1}}
.mem{break-inside:avoid;display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line)}
.mem:hover .h{text-decoration:underline;text-underline-offset:2px}
.mem .av{width:20px;height:20px;border-radius:50%;flex:0 0 auto;background:var(--line);object-fit:cover}
.mem .h{font-family:var(--mono);font-size:13px}
.mem .pv{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap}
.mem .pv .pg{color:#0a7}.mem .pv .og{color:var(--acc)}.mem .pv .mn{color:#a50}

footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--line2);font-family:var(--mono);font-size:12px;color:var(--faint);display:flex;gap:20px;flex-wrap:wrap}
footer a:hover{color:var(--ink)}
.load{font-family:var(--mono);color:var(--faint);padding:40px 0}
</style></head><body>
<div class="wrap">
  <header>
    <div class="brand"><a href="/" data-link>coredevs<span class="m">core developer registry</span></a></div>
    <div class="live" id="live"></div>
  </header>
  <div id="app"><div class="load">loading…</div></div>
  <footer>
    <a href="https://github.com/ethpandaops/coredevs">GitHub</a>
    <a href="/api/v1/teams">/api/v1/teams</a>
    <a href="/api/v1/export">/api/v1/export</a>
    <a href="/metrics">/metrics</a>
  </footer>
</div>
<script>
// Pure presentation: a preferred order + nicer labels for known kinds. The set
// of kinds actually rendered is derived from the API response (see orderedKinds),
// so any kind the API introduces still shows up — falling back to a title-cased
// label. Nothing about the registry's content is hardcoded here.
const KIND_ORDER=["client","research","coordination","delivery"];
const KIND_LABEL={client:"Clients",research:"Research",coordination:"Coordination",delivery:"Upgrade Delivery"};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const cap=s=>String(s).split(/[-_ ]/).filter(Boolean).map(w=>w[0].toUpperCase()+w.slice(1)).join(" ");
const klabel=k=>KIND_LABEL[k]||cap(k);
const orderedKinds=teams=>[...new Set(teams.map(t=>t.kind||"other"))]
  .sort((a,b)=>{const r=k=>{const i=KIND_ORDER.indexOf(k);return i<0?99:i};return r(a)-r(b)||a.localeCompare(b)});
const tok=s=>'<span class="tok">'+esc(s)+'</span>';
const ago=i=>{let s=Math.max(0,(Date.now()-new Date(i))/1e3);return s<90?Math.round(s)+"s":s<5400?Math.round(s/60)+"m":s<1296e2?Math.round(s/3600)+"h":Math.round(s/864e2)+"d"};
const HOST=location.protocol+"//"+location.host;
const j=p=>fetch(p).then(r=>r.ok?r.json():Promise.reject(r.status));
let TEAMS=null,SRC=null;

function curl(path){ // path may contain <span class=tok> markup already
  return `<span class="mut">$</span> curl ${HOST}${path}`;
}
function exRow(desc,path){
  return `<div class="ex"><div class="d">${esc(desc)}</div>`
    +`<div class="c"><span>${curl(path)}</span><button class="cp">copy</button></div></div>`;
}
function bindCopies(root){
  root.querySelectorAll(".cp").forEach(b=>b.onclick=()=>{
    const t=b.parentElement.querySelector("span").innerText.replace(/^\$\s*/,"");
    navigator.clipboard.writeText(t);b.textContent="copied";setTimeout(()=>b.textContent="copy",1100);
  });
}
function nav(e,href){e.preventDefault();history.pushState({},"",href);window.scrollTo(0,0);route();}
function wireLinks(root){root.querySelectorAll("[data-link]").forEach(a=>a.onclick=e=>nav(e,a.getAttribute("href")));}

async function ensureBase(){
  if(!TEAMS){const[t,s]=await Promise.all([j("/api/v1/teams"),j("/api/v1/sources")]);TEAMS=t;SRC=s;}
}
function liveBar(){
  if(!TEAMS){document.getElementById("live").textContent="";return;}
  document.getElementById("live").innerHTML=`<b>●</b> live · updated ${ago(TEAMS.generatedAt)} ago`;
}

async function renderHome(){
  await ensureBase();liveBar();
  const T=TEAMS.teams,S={};(SRC.sources||[]).forEach(s=>S[s.name]=s.members);
  const tot=T.reduce((a,t)=>a+t.count,0);
  const ex=await buildExamples(T);
  let h=`<h2>Query the registry</h2><div class="api">`+ex+`</div>`;
  h+=`<h2>State</h2><div class="stats">`
    +[["Teams",T.length],["Names",tot],["Protocol Guild",S["protocol-guild"]||0],["GitHub Orgs",S["github-org"]||0]]
      .map(([k,v])=>`<div class="st"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("")
    +`</div>`;
  const by={};T.forEach(t=>(by[t.kind||"other"]??=[]).push(t));
  h+=`<h2>Teams</h2>`;
  for(const k of orderedKinds(T)){const rows=(by[k]||[]).sort((a,b)=>b.count-a.count);if(!rows.length)continue;
    const sum=rows.reduce((a,t)=>a+t.count,0);
    h+=`<div class="kind"><div class="kh"><h3>${esc(klabel(k))}</h3><span class="c">${rows.length} teams · ${sum}</span></div>`;
    for(const t of rows){const c=t.counts||{};
      const br=[["pg","protocol-guild"],["org","github-org"],["man","manual"]]
        .filter(([,s])=>s!=="manual"||c[s]).map(([l,s])=>`${l} ${c[s]?c[s]:'<span class="z">0</span>'}`).join("  ");
      h+=`<a class="row" data-link href="/team/${encodeURIComponent(t.slug)}">`
        +`<span><span class="nm">${esc(t.displayName||t.slug)}</span><span class="sg">${esc(t.slug)}</span></span>`
        +`<span class="br">${br}</span><span class="tt">${t.count} <span class="arw">→</span></span></a>`;}
    h+=`</div>`;}
  const app=document.getElementById("app");app.innerHTML=h;wireLinks(app);bindCopies(app);
}

// Examples are built from real values in the live data — a real team slug, a
// real handle and a real org pulled from a sample roster — so they never go
// stale and aren't coupled to any hardcoded names.
async function buildExamples(T){
  const firstKind=orderedKinds(T)[0]||"client";
  const exTeam=(T.filter(t=>t.kind==="client").sort((a,b)=>b.count-a.count)[0]||T[0]||{}).slug||"<team>";
  const orgTeam=T.find(t=>(t.counts||{})["github-org"]);
  const pgTeam=T.find(t=>(t.counts||{})["protocol-guild"])||{slug:exTeam};
  let handle="<handle>",org="<org>";
  try{const r=await j("/api/v1/users/"+encodeURIComponent((orgTeam||{slug:exTeam}).slug||exTeam));
    const ms=r.members||[];if(ms[0])handle=ms[0].handle;
    const wo=ms.find(m=>(m.orgs||[]).length);if(wo)org=wo.orgs[0];}catch(_){}
  return exRow("Every team with counts","/api/v1/teams")
    +exRow("Everyone, deduplicated across teams","/api/v1/users")
    +exRow("Only the "+firstKind+" teams","/api/v1/teams?kind="+tok(firstKind))
    +exRow("A team roster, ansible-ready","/api/v1/users/"+tok(exTeam)+"?format="+tok("yaml"))
    +exRow("A team, one source only","/api/v1/users/"+tok(pgTeam.slug)+"?source="+tok("protocol-guild"))
    +exRow("Plain newline-separated handles","/api/v1/users/"+tok(exTeam)+"?format="+tok("txt"))
    +exRow("Which teams a handle is on","/api/v1/handles/"+tok(handle))
    +exRow("Public members of any GitHub org","/api/v1/orgs/"+tok(org)+"/members");
}

async function renderTeam(slug){
  await ensureBase();liveBar();
  const meta=(TEAMS.teams||[]).find(t=>t.slug===slug);
  let data;try{data=await j("/api/v1/users/"+encodeURIComponent(slug));}catch(_){return notFound(slug);}
  const members=(data.members||[]).slice().sort((a,b)=>a.handle.toLowerCase().localeCompare(b.handle.toLowerCase()));
  const c=meta?meta.counts||{}:{};
  const name=meta?(meta.displayName||slug):slug, kind=meta?meta.kind:"", layer=meta?meta.layer:"";
  let h=`<div class="crumb"><a href="/" data-link>coredevs</a><span class="sep">/</span>teams<span class="sep">/</span>${esc(slug)}</div>`
    +`<div class="thead"><div><h1>${esc(name)}</h1><div class="meta">`
    +(kind?`<span class="kpill">${esc(kind)}</span> `:"")+(layer?`<span class="kpill">${esc(layer).toUpperCase()}</span> `:"")
    +`&nbsp;${esc(slug)} · `
    +[["protocol guild","protocol-guild"],["github","github-org"],["manual","manual"]].filter(([,s])=>c[s]).map(([l,s])=>`${l} ${c[s]}`).join(" · ")
    +`</div></div><div class="big">${data.count}<small>NAMES</small></div></div>`;

  h+=`<h2>Roster</h2><div class="members">`;
  for(const m of members){
    const pv=(m.sources||[]).map(s=>s==="protocol-guild"?'<span class="pg">pg</span>':s==="github-org"?'<span class="og">org</span>':'<span class="mn">man</span>').join(" ");
    const hh=encodeURIComponent(m.handle);
    h+=`<a class="mem" href="https://github.com/${hh}" target="_blank" rel="noopener">`
      +`<img class="av" src="https://github.com/${hh}.png?size=48" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
      +`<span class="h">${esc(m.handle)}</span><span class="pv">${pv}</span></a>`;
  }
  if(!members.length)h+=`<div class="load">no members</div>`;
  h+=`</div>`;

  h+=`<h2>Query ${esc(name)}</h2><div class="api">`
    +exRow("This roster as JSON","/api/v1/users/"+slug)
    +exRow("Ansible-ready YAML list","/api/v1/users/"+slug+'?format=<span class="tok">yaml</span>')
    +exRow("Plain newline-separated handles","/api/v1/users/"+slug+'?format=<span class="tok">txt</span>')
    +(c["protocol-guild"]?exRow("Protocol Guild members only","/api/v1/users/"+slug+'?source=<span class="tok">protocol-guild</span>'):"")
    +(c["github-org"]?exRow("GitHub-org members only","/api/v1/users/"+slug+'?source=<span class="tok">github-org</span>'):"")
    +`</div>`;
  const app=document.getElementById("app");app.innerHTML=h;wireLinks(app);bindCopies(app);
}

function notFound(slug){
  document.getElementById("app").innerHTML=
    `<div class="crumb"><a href="/" data-link>coredevs</a><span class="sep">/</span>teams<span class="sep">/</span>${esc(slug)}</div>`
    +`<div class="thead"><div><h1>Unknown team</h1><div class="meta">no team “${esc(slug)}” in the registry</div></div></div>`;
  wireLinks(document.getElementById("app"));
}

function route(){
  const m=location.pathname.match(/^\/team\/([^\/]+)\/?$/);
  if(m)renderTeam(decodeURIComponent(m[1]));else renderHome();
}
window.addEventListener("popstate",route);
route();
setInterval(()=>{if(location.pathname==="/"){TEAMS=null;route();}},60000);
</script>
</body></html>
