name: golangci-lint

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=10m
